version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: gift-system-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '123456'
      POSTGRES_DB: gift_system
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
